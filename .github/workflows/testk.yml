name: Extract Kernel Headers for MT8168

on: [push, pull_request]

jobs:
  extract-headers:
    name: Extract Kernel Headers
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev device-tree-compiler rsync

      - name: Generate Kernel Headers
        run: |
          make ARCH=arm64 a04br3_defconfig
          make ARCH=arm64 headers_install INSTALL_HDR_PATH=./kernel-headers

      - name: Copy dt-bindings Headers
        run: |
          cp -r ./include/dt-bindings ./kernel-headers/include/

      - name: Package Headers
        run: |
          mkdir -p device/mediatek/mt8167
          mv ./kernel-headers device/mediatek/mt8167/
          zip -r kernel-headers.zip device/mediatek/mt8167/kernel-headers/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-headers
          path: kernel-headers.zip
